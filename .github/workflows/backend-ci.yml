name: Backend CI

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build + SonarCloud Analysis
        run: |
          cd backend
          mvn clean install -Dmaven.test.skip=true sonar:sonar \
            -Dsonar.projectKey=eyadabbaghi_Esprit-PI-4SAE2-2025-EverCare \
            -Dsonar.organization=eyadabbaghi \
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}