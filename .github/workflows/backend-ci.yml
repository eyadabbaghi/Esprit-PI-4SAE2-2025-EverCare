name: Backend CI

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Verify project structure
      run: echo "Project detected successfully"

    - name: List files
      run: ls -R

    #  Build backend 
    - name: Build project
      run: |
        cd backend
        mvn clean install -DskipTests

    # SonarCloud analysis (FIXED)
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        projectBaseDir: backend
        args: >
          -Dsonar.projectKey=eyadabbaghi_Esprit-PI-4SAE2-2025-EverCare
          -Dsonar.organization=eyadabbaghi
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}