spring.application.name=activities-service
server.port=8092
#server.servlet.context-path=/EverCare

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Static resources for uploaded files
spring.web.resources.static-locations=file:./uploads/,classpath:/static/
spring.web.resources.static-locations[1]=file:./uploads/activities/

spring.config.import=optional:file:./application-secrets.properties,optional:file:./Activities/application-secrets.properties,optional:file:./backend/Activities/application-secrets.properties

huggingface.api.key=${HUGGINGFACE_API_KEY:}
huggingface.api.url=https://router.huggingface.co/hf-inference/models/sshleifer/distilbart-cnn-12-6
