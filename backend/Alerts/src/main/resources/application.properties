spring.application.name=alerts-service
spring.config.import=optional:file:./secrets.properties,optional:file:./Alerts/secrets.properties,optional:file:./backend/Alerts/secrets.properties
server.port=8095
server.servlet.context-path=/EverCare

# MySQL Database (use a separate database name, e.g., EverCareAlerts)
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

# WebSocket debug logging
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web=DEBUG

# See exactly what requests are coming in
logging.level.org.springframework.security=DEBUG

# Groq-powered incident AI insights. Keep the real key in the environment, not in source code.
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# Email alert channel
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EVERCARE_MAIL_USERNAME:}
spring.mail.password=${EVERCARE_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
