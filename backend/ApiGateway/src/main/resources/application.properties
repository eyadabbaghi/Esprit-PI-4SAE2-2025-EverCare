spring.application.name=api-gateway
server.port=8089

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.routes[0].id=dailyme
spring.cloud.gateway.routes[0].uri=lb://dailyme-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/dailyme/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=tracking
spring.cloud.gateway.routes[1].uri=lb://tracking-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/tracking/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=activities-legacy
spring.cloud.gateway.routes[2].uri=lb://activities-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/EverCare/activities/**,/EverCare/admin/activities/**,/EverCare/admin/activity-details/**,/EverCare/admin/uploads/**,/EverCare/uploads/activities/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=activities
spring.cloud.gateway.routes[3].uri=lb://activities-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/activities/**

spring.cloud.gateway.routes[4].id=alerts-ws-legacy
spring.cloud.gateway.routes[4].uri=lb:ws://alerts-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/EverCare/ws-check,/EverCare/ws-check/**

spring.cloud.gateway.routes[5].id=alerts-ws
spring.cloud.gateway.routes[5].uri=lb:ws://alerts-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/alerts/ws-check,/alerts/ws-check/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[5].filters[1]=PrefixPath=/EverCare

spring.cloud.gateway.routes[6].id=alerts-legacy
spring.cloud.gateway.routes[6].uri=lb://alerts-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/EverCare/alerts/**,/EverCare/incidents/**,/EverCare/evicare/**

spring.cloud.gateway.routes[7].id=alerts
spring.cloud.gateway.routes[7].uri=lb://alerts-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/alerts/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[7].filters[1]=PrefixPath=/EverCare

spring.cloud.gateway.routes[8].id=notifications-legacy
spring.cloud.gateway.routes[8].uri=lb://notification-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/EverCare/api/notifications/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[9].id=blog-legacy
spring.cloud.gateway.routes[9].uri=lb://blog-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/EverCare/blog-service/**
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[10].id=blog
spring.cloud.gateway.routes[10].uri=lb://blog-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/blog/**
spring.cloud.gateway.routes[10].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[11].id=user
spring.cloud.gateway.routes[11].uri=lb://user-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/EverCare/**
