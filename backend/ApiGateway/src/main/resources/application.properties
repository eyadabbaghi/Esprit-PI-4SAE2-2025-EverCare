#Server
spring.application.name=ApiGateway
server.port=8089

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

#GATEWAY
# Configuration des logs - une propri�t� par ligne
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true




spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/EverCareRealm/protocol/openid-connect/certs

# DAILYME
spring.cloud.gateway.routes[0].id=dailyme
spring.cloud.gateway.routes[0].uri=http://localhost:8098
spring.cloud.gateway.routes[0].predicates[0]=Path=/dailyme/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# TRACKING
spring.cloud.gateway.routes[1].id=tracking
spring.cloud.gateway.routes[1].uri=http://localhost:8099
spring.cloud.gateway.routes[1].predicates[0]=Path=/tracking/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

