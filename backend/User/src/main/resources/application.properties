spring.application.name=User-service

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb44?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jmx.enabled=false

# Server
server.port=8096
server.servlet.context-path=/EverCare

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ========================================
# CHANGED: Keycloak Admin configuration
# Previously used service account client credentials which weren't properly set up.
# Now uses master realm admin credentials for user management operations.
# Add these properties if they don't match your Keycloak setup.
# ========================================
keycloak.admin-user=admin
keycloak.admin-password=admin

# Keycloak Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/EverCareRealm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/EverCareRealm/protocol/openid-connect/certs

# Keycloak config
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=EverCareRealm

