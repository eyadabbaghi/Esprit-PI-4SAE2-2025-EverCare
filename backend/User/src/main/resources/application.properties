spring.application.name=User-service
spring.config.import=optional:file:./secrets.properties,optional:file:./User/secrets.properties,optional:file:./backend/User/secrets.properties

# MySQL Database
#spring.datasource.url=jdbc:mysql://127.0.0.1:3306/EverCaredb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=30000
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jmx.enabled=false

# Server
server.port=8096
server.servlet.context-path=/EverCare

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Google Client ID
google.client-id=701632621274-bbb8eau1rg0vv6c78c17sp02qm271h9k.apps.googleusercontent.com

# Email verification. Add real SMTP values when you want real delivery.
# If not configured, verification codes are logged in the User service console for development.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EVERCARE_MAIL_USERNAME:}
spring.mail.password=${EVERCARE_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
evercare.mail.from=${EVERCARE_MAIL_FROM:EverCare <no-reply@evercare.local>}

# Twilio SMS verification
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# Keycloak OIDC - for token validation (port 8180 now)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/EverCareRealm/protocol/openid-connect/certs

# Keycloak Admin API client - for registration / password change
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=EverCareRealm
keycloak.client-id=evercare
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}

keycloak.face-client-id=face-login-service
keycloak.face-client-secret=${KEYCLOAK_FACE_CLIENT_SECRET:}
keycloak.frontend-client-id=frontend-app
keycloak.frontend-client-secret=${KEYCLOAK_FRONTEND_CLIENT_SECRET:}


#Fce recog
face.service.url=http://localhost:8085

# Communication service internal maintenance endpoints
communication.email-reference-update-url=http://localhost:8086/api/internal/email-reference-update
