spring.application.name=user-service

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jmx.enabled=false
spring.sql.init.mode=always

# Server
server.port=8096
server.servlet.context-path=/EverCare

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Google Client ID
google.client-id=122324853691-34s6l0e9bho0a65vlj82pf6o63u6b8vg.apps.googleusercontent.com

# Keycloak OIDC - for token validation (port 8180 now)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/EverCareRealm/protocol/openid-connect/certs

# Keycloak Admin API client - for registration / password change
