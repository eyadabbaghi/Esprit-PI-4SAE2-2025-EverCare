spring.application.name=User-service

# H2 In-Memory Database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Server
server.port=8096
server.servlet.context-path=/EverCare

# Disable Eureka for tests
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Keycloak (mock values for tests)
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=EverCareRealm
keycloak.client-id=evercare
keycloak.client-secret=test-secret
keycloak.face-client-id=face-login-service
keycloak.face-client-secret=test-secret

# OAuth2 (disabled for unit tests - using mock JWT)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/EverCareRealm/protocol/openid-connect/certs

# Google Client
google.client-id=test-client-id