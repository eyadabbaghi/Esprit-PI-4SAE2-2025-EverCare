spring.application.name=cognitive-stimulation-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/alzheimer_cognitive_stimulation?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.medical-record-service.base-url=http://localhost:8083
