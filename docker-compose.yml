version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  mysql:
    image: mysql:8.0
    container_name: evercare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: EverCaredb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - evercare-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: evercare-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8180:8080"
    networks:
      - evercare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # SERVICE DISCOVERY
  # ============================================

  eureka:
    image: badrftw/evercare-eureka-service:latest
    container_name: evercare-eureka
    ports:
      - "8761:8761"
    networks:
      - evercare-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # API GATEWAY
  # ============================================

  api-gateway:
    image: badrftw/evercare-api-gateway:latest
    container_name: evercare-gateway
    environment:
      SPRING_PROFILES_ACTIVE: default
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    ports:
      - "8089:8089"
    networks:
      - evercare-network
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # MICROSERVICES
  # ============================================

  blog-service:
    image: badrftw/evercare-blog-service:latest
    container_name: evercare-blog
    environment:
      SPRING_PROFILES_ACTIVE: default
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/EverCaredb?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/EverCareRealm/protocol/openid-connect/certs
    ports:
      - "8087:8087"
    networks:
      - evercare-network
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  medical-record-service:
