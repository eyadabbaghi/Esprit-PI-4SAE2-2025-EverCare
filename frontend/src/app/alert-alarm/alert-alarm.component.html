<div *ngIf="visible" class="alarm-overlay">
  <div class="alarm-card">
    <!-- Pulsing bell icon -->
    <div class="alarm-icon-wrapper">
      <div class="alarm-pulse"></div>
      <svg class="alarm-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z"
              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"
              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="alarm-title">Alert Reminder</p>
    <h2 class="alarm-label">{{ currentFire?.label || 'Alert' }}</h2>
    <p class="alarm-incident">Incident: <strong>{{ currentFire?.incidentTitle }}</strong></p>

    <!-- Countdown ring -->
    <div class="countdown-wrapper">
      <svg viewBox="0 0 80 80" class="countdown-svg">
        <circle cx="40" cy="40" r="34" fill="none" stroke="#fff2" stroke-width="5"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke="white" stroke-width="5"
                stroke-linecap="round"
                [style.stroke-dasharray]="213.6"
                [style.stroke-dashoffset]="213.6 * (1 - countdown / 60)"
                transform="rotate(-90 40 40)"/>
      </svg>
      <span class="countdown-text">{{ countdown }}s</span>
    </div>

    <p class="alarm-warning" *ngIf="countdown <= 15">
      ⚠️ Caregiver will be alerted in {{ countdown }}s
    </p>

    <button class="complete-btn" (click)="complete()">
      ✓ Mark as Complete
    </button>
  </div>
</div>
