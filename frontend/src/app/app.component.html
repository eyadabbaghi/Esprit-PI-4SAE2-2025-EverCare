<div class="evercare-route-loader" *ngIf="isRouteLoading" aria-live="polite" aria-busy="true">
  <div class="loader-card">
    <div class="loader-orbit" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div>
      <p>EverCare</p>
      <strong>Loading your care space</strong>
    </div>
    <div class="loader-progress" aria-hidden="true">
      <span></span>
    </div>
  </div>
</div>

<div class="page-welcome-overlay" *ngIf="pageWelcome">
  <div class="page-welcome-card">
    <button type="button" class="page-welcome-close" (click)="dismissPageWelcome()" aria-label="Close welcome popup">
      <span></span>
      <span></span>
    </button>

    <div class="page-welcome-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 3 4 7v5c0 5.1 3.4 8.8 8 10 4.6-1.2 8-4.9 8-10V7l-8-4Z"></path>
        <path d="M9 12.4 11 14.4 15.5 9.8"></path>
      </svg>
    </div>

    <p>{{ pageWelcome.eyebrow }}</p>
    <h2>{{ pageWelcome.title }}</h2>
    <span>{{ pageWelcome.description }}</span>

    <div class="page-welcome-progress" aria-hidden="true">
      <i></i>
    </div>

    <button type="button" class="page-welcome-action" (click)="dismissPageWelcome()">Got it</button>
  </div>
</div>

<router-outlet></router-outlet>
