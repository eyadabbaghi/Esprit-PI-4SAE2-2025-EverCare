<section class="appointment-form-card">
  <header class="form-header">
    <div>
      <span class="form-eyebrow">Final step</span>
      <h2>{{ title }}</h2>
      <p>{{ subtitle }}</p>
    </div>
    <button type="button" class="form-close" (click)="onClose.emit()" aria-label="Back to slot selection">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M18 6 6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"></path>
      </svg>
    </button>
  </header>

  <div class="form-grid">
    <label class="field-card">
      <span>Doctor *</span>
      <select [(ngModel)]="formData.doctorId" (change)="onDoctorChange.emit(formData.doctorId)">
        <option value="">Choose a doctor</option>
        <option *ngFor="let doctor of doctors" [value]="doctor.userId">{{ doctor.name }}</option>
      </select>
    </label>

    <label class="field-card">
      <span>Consultation type *</span>
      <select [(ngModel)]="formData.consultationTypeId" (change)="onTypeChange.emit(formData.consultationTypeId)">
        <option value="">Choose consultation type</option>
        <option *ngFor="let type of consultationTypes" [value]="type.typeId">
          {{ type.name }} ({{ type.alzheimerDuration }} min)
        </option>
      </select>
    </label>

    <label class="field-card">
      <span>Date *</span>
      <app-modern-date-picker
        [(ngModel)]="formData.date"
        [min]="minDate"
        placeholder="Choose a date"
        (dateChange)="onDateChange.emit(formData.date)">
      </app-modern-date-picker>
    </label>

    <label class="field-card">
      <span>Time *</span>
      <select [(ngModel)]="formData.time" [disabled]="!availableSlots.length">
        <option value="">Choose a time slot</option>
        <option *ngFor="let slot of availableSlots" [value]="slot">{{ slot }}</option>
      </select>
    </label>

    <label class="field-card" *ngIf="caregivers.length > 0">
      <span>Caregiver</span>
      <select [(ngModel)]="formData.caregiverId">
        <option value="">No caregiver</option>
        <option *ngFor="let caregiver of caregivers" [value]="caregiver.userId">{{ caregiver.name }}</option>
      </select>
    </label>

    <label class="field-card">
      <span>Caregiver presence</span>
      <select [(ngModel)]="formData.caregiverPresence">
        <option value="NONE">Patient only</option>
        <option value="PHYSICAL">Caregiver will attend in person</option>
        <option value="REMOTE">Caregiver will join remotely</option>
      </select>
    </label>

    <label class="field-card field-card-wide">
      <span>Notes</span>
      <textarea [(ngModel)]="formData.notes" rows="3" placeholder="Add symptoms, goals, or anything the doctor should know..."></textarea>
    </label>
  </div>

  <button type="button" class="submit-appointment" (click)="onSubmit.emit(formData)" [disabled]="!isValid()">
    <span>{{ submitText }}</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
      <path d="M20 6 9 17l-5-5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
  </button>
</section>
