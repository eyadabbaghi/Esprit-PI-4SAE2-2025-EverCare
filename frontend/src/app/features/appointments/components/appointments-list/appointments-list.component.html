<div class="bg-white rounded-xl border border-[#C4B5FD] shadow-sm overflow-hidden">
  <div class="p-6 border-b border-[#C4B5FD] bg-[#F9FAFB]">
    <h2 class="text-lg font-semibold text-[#2D1B4E]">{{ title }}</h2>
    <p *ngIf="subtitle" class="text-sm text-[#6B5B8C]">{{ subtitle }}</p>
  </div>

  <div class="p-6">
    <!-- No appointments message -->
    <div *ngIf="appointments.length === 0" class="text-center py-12">
      <svg class="w-16 h-16 text-[#C4B5FD] mx-auto mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/>
      </svg>
      <p class="text-[#6B5B8C]">{{ emptyMessage }}</p>
    </div>

    <!-- Appointments List -->
    <div class="space-y-4">
      <app-appointment-card
        *ngFor="let appointment of appointments"
        [appointment]="appointment"

        (onClick)="onCardClick.emit($event)"
        >
      </app-appointment-card>
    </div>
  </div>
</div>
