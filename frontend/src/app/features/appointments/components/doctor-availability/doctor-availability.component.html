<section class="doctor-picker">
  <header class="picker-header">
    <div>
      <span class="picker-eyebrow">Step 1</span>
      <h3>Available doctors</h3>
      <p>Select a doctor to see their scheduling windows.</p>
    </div>
  </header>

  <div class="specialty-filter">
    <button
      *ngFor="let specialty of specialties"
      type="button"
      [class.specialty-active]="selectedSpecialty === specialty"
      (click)="selectedSpecialty = specialty">
      {{ specialty }}
    </button>
  </div>

  <div class="doctor-list">
    <button
      *ngFor="let doctor of filteredDoctors"
      type="button"
      class="doctor-card"
      [class.doctor-card-selected]="selectedDoctorId === doctor.userId"
      (click)="selectDoctor(doctor)">
      <img [src]="doctor.profilePicture || 'assets/default-avatar.png'" [alt]="doctor.name">

      <div class="doctor-info">
        <div class="doctor-title-row">
          <div>
            <h4>{{ doctor.name }}</h4>
            <p>{{ doctor.email }}</p>
          </div>
          <span
            class="availability-pill"
            [class.high]="getAvailabilityStatus(doctor) === 'high'"
            [class.medium]="getAvailabilityStatus(doctor) === 'medium'"
            [class.low]="getAvailabilityStatus(doctor) === 'low'">
            {{ getAvailabilityText(doctor) }}
          </span>
        </div>

        <div class="slot-preview">
          <span *ngFor="let slot of getNextSlots(doctor)">{{ slot }}</span>
          <span *ngIf="getNextSlots(doctor).length === 0" class="no-slot">No slots this week</span>
        </div>
      </div>
    </button>

    <div *ngIf="filteredDoctors.length === 0" class="empty-doctors">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <circle cx="12" cy="8" r="4" stroke-width="2"></circle>
        <path d="M5 21v-2a7 7 0 0 1 14 0v2" stroke-width="2" stroke-linecap="round"></path>
      </svg>
      <p>No doctors found</p>
    </div>
  </div>
</section>
