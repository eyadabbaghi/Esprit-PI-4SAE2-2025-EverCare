<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/50" (click)="onClose.emit()"></div>
  <div class="relative bg-white rounded-xl shadow-2xl max-w-lg w-full">
    <div class="p-6">
      <div class="flex justify-between items-start mb-4">
        <h2 class="text-xl font-semibold text-[#2D1B4E]">Add Schedule Exception</h2>
        <button class="p-1 hover:bg-[#F3E8FF] rounded-full" (click)="onClose.emit()">
          <svg class="w-5 h-5 text-[#6B5B8C]" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="space-y-4">
        <!-- Exception Type -->
        <div>
          <label class="block text-sm font-medium text-[#2D1B4E] mb-2">Exception Type</label>
          <select [(ngModel)]="exception.type"
                  class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md focus:outline-none focus:ring-2 focus:ring-[#7C3AED]">
            <option value="VACATION">Vacation</option>
            <option value="SICK_LEAVE">Sick Leave</option>
            <option value="TRAINING">Training / Conference</option>
            <option value="MEETING">Meeting</option>
            <option value="PERSONAL">Personal</option>
          </select>
        </div>

        <!-- Date -->
        <div>
          <label class="block text-sm font-medium text-[#2D1B4E] mb-2">Date</label>
          <input type="date" [(ngModel)]="exception.date"
                 [min]="today"
                 class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md focus:outline-none focus:ring-2 focus:ring-[#7C3AED]">
        </div>

        <!-- Full Day or Partial -->
        <div class="flex items-center space-x-4">
          <label class="flex items-center">
            <input type="radio" [(ngModel)]="exception.isFullDay" [value]="true"
                   class="w-4 h-4 text-[#7C3AED]">
            <span class="ml-2 text-sm text-[#2D1B4E]">Full Day</span>
          </label>
          <label class="flex items-center">
            <input type="radio" [(ngModel)]="exception.isFullDay" [value]="false"
                   class="w-4 h-4 text-[#7C3AED]">
            <span class="ml-2 text-sm text-[#2D1B4E]">Partial Day</span>
          </label>
        </div>

        <!-- Time Range (if partial day) -->
        <div *ngIf="!exception.isFullDay" class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-[#2D1B4E] mb-2">Start Time</label>
            <input type="time" [(ngModel)]="exception.startTime"
                   class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md focus:outline-none focus:ring-2 focus:ring-[#7C3AED]">
          </div>
          <div>
            <label class="block text-sm font-medium text-[#2D1B4E] mb-2">End Time</label>
            <input type="time" [(ngModel)]="exception.endTime"
                   class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md focus:outline-none focus:ring-2 focus:ring-[#7C3AED]">
          </div>
        </div>

        <!-- Reason -->
        <div>
          <label class="block text-sm font-medium text-[#2D1B4E] mb-2">Reason (Optional)</label>
          <textarea [(ngModel)]="exception.reason"
                    rows="2"
                    placeholder="Add a note..."
                    class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md focus:outline-none focus:ring-2 focus:ring-[#7C3AED]">
              </textarea>
        </div>

        <!-- Submit Button -->
        <button class="w-full bg-[#7C3AED] hover:bg-[#6D28D9] text-white py-2 px-4 rounded-md transition-colors"
                (click)="onSubmit">
          Add Exception
        </button>
      </div>
    </div>
  </div>
</div>
