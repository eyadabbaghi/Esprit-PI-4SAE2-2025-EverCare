<div *ngIf="patient" class="bg-white rounded-xl border border-[#C4B5FD] shadow-sm p-6">
  <div class="flex items-start space-x-6">
    <img [src]="patient.profilePicture || 'assets/default-avatar.png'"
         class="w-24 h-24 rounded-full border-4 border-white shadow-lg">
    <div class="flex-1">
      <h2 class="text-2xl font-bold text-[#2D1B4E]">{{ patient.name }}</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
        <div>
          <p class="text-xs text-[#6B5B8C]">Age</p>
          <p class="font-medium">{{ age }} years</p>
        </div>
        <div>
          <p class="text-xs text-[#6B5B8C]">Total Appointments</p>
          <p class="font-medium">{{ totalAppointments }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
