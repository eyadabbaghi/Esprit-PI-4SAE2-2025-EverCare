<section class="weekly-scheduler">
  <header class="schedule-header">
    <div>
      <span class="schedule-eyebrow">Step 2</span>
      <h3>Available time slots</h3>
      <p>Select a time for your appointment.</p>
    </div>
  </header>

  <div class="week-nav">
    <button type="button" (click)="previousWeek()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M15 18 9 12l6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      Previous week
    </button>
    <strong>{{ weekStart | date:'dd MMM' }} - {{ weekEnd | date:'dd MMM yyyy' }}</strong>
    <button type="button" (click)="nextWeek()">
      Next week
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="m9 18 6-6-6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>
  </div>

  <div class="calendar-board">
    <div class="day-header" *ngFor="let day of weekDays; let i = index">
      <strong>{{ day }}</strong>
      <span>{{ weekDates[i] | date:'dd' }}</span>
    </div>

    <ng-container *ngFor="let timeSlot of timeSlots">
      <button
        *ngFor="let slot of timeSlot.slots"
        type="button"
        class="time-cell"
        [class.time-cell-selected]="slot.selected"
        [class.time-cell-available]="slot.available && !slot.selected"
        [class.time-cell-unavailable]="!slot.available"
        [disabled]="!slot.available"
        (click)="slot.available && selectSlot(slot)">
        {{ slot.time }}
      </button>
    </ng-container>
  </div>

  <div class="schedule-legend">
    <span><i class="legend-selected"></i>Selected</span>
    <span><i class="legend-available"></i>Available</span>
    <span><i class="legend-booked"></i>Booked</span>
  </div>
</section>
