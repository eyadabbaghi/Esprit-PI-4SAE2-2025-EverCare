<div class="min-h-screen bg-black flex items-center justify-center">
  <div class="w-full max-w-sm px-6 space-y-8">

    <!-- EMAIL ENTRY -->
    <div *ngIf="state === 'email-entry'" class="text-center space-y-6 animate-fadeIn">
      <div class="flex justify-center">
        <div class="w-24 h-24 rounded-full bg-[#7C3AED]/20 border-2 border-[#7C3AED] flex items-center justify-center">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.5">
            <circle cx="12" cy="8" r="4"/>
            <path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          </svg>
        </div>
      </div>

      <div>
        <h1 class="text-white text-3xl font-semibold">Face ID Login</h1>
        <p class="text-gray-400 mt-2 text-sm">Enter your email, then look at the camera</p>
      </div>

      <input
        [(ngModel)]="email"
        type="email"
        placeholder="your.email@example.com"
        class="w-full bg-white/10 text-white border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-[#7C3AED] placeholder-gray-500"
      />

      <div *ngIf="errorMessage" class="text-red-400 text-sm">{{ errorMessage }}</div>

      <button (click)="startFaceLogin()" [disabled]="!email"
        class="w-full bg-[#7C3AED] hover:bg-[#6D28D9] disabled:opacity-40 text-white font-semibold py-4 rounded-2xl transition-all text-lg">
        Continue with Face ID
      </button>

      <button (click)="goToPasswordLogin()" class="text-gray-500 hover:text-gray-300 text-sm transition-colors">
        Use password instead
      </button>
    </div>

    <!-- SCANNING -->
    <div *ngIf="state === 'scanning'" class="text-center space-y-4 animate-fadeIn">
      <h2 class="text-white text-xl">Looking for your face...</h2>

      <div class="relative flex justify-center">
        <div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
          <svg width="300" height="300" viewBox="0 0 300 300" class="rotate-animation">
            <circle cx="150" cy="150" r="145" fill="none" stroke="#7C3AED" stroke-width="3"
              stroke-dasharray="50 862" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="absolute inset-0 flex items-center justify-center z-0">
          <div class="w-64 h-64 rounded-full bg-[#7C3AED]/10 pulse-glow"></div>
        </div>
        <div class="w-64 h-64 rounded-full overflow-hidden border-2 border-[#7C3AED]/40 relative z-5">
          <video #videoEl autoplay playsinline muted
            class="w-full h-full object-cover scale-x-[-1]"></video>
        </div>
      </div>

      <p class="text-gray-400 text-sm">Hold still — scanning automatically</p>
    </div>

    <!-- PROCESSING -->
    <div *ngIf="state === 'processing'" class="text-center space-y-6 animate-fadeIn">
      <div class="flex justify-center">
        <div class="w-24 h-24 rounded-full border-4 border-[#7C3AED] border-t-transparent animate-spin"></div>
      </div>
      <p class="text-white text-lg">Verifying identity...</p>
    </div>

    <!-- SUCCESS -->
    <div *ngIf="state === 'success'" class="text-center space-y-6 animate-fadeIn">
      <div class="flex justify-center">
        <div class="w-28 h-28 rounded-full bg-green-500/20 border-2 border-green-500 flex items-center justify-center success-pop">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <h2 class="text-white text-2xl font-semibold">Welcome back!</h2>
      <p class="text-gray-400 text-sm">Face recognized — redirecting...</p>
    </div>

    <!-- FAILED -->
    <div *ngIf="state === 'failed'" class="text-center space-y-6 animate-fadeIn shake">
      <div class="flex justify-center">
        <div class="w-24 h-24 rounded-full bg-red-500/20 border-2 border-red-500 flex items-center justify-center">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
      <h2 class="text-white text-xl">Face not recognized</h2>
      <p class="text-gray-400 text-sm">{{ errorMessage }}</p>
      <p class="text-gray-500 text-xs">Attempt {{ retryCount }}/{{ maxRetries }}</p>
      <button (click)="retry()"
        class="w-full bg-[#7C3AED] text-white py-4 rounded-2xl font-semibold">
        {{ retryCount >= maxRetries ? 'Use Password Instead' : 'Try Again' }}
      </button>
    </div>

  </div>
</div>
