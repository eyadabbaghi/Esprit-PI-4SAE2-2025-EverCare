<div class="fixed bottom-6 right-6 z-40 flex flex-col items-end space-y-3">

  <!-- Chat Panel -->
  <div *ngIf="isOpen"
    class="w-96 max-w-[92vw] bg-white rounded-2xl shadow-2xl border border-purple-100 overflow-hidden flex flex-col"
    style="height: 520px;">

    <!-- Header -->
    <div class="px-4 py-3 bg-gradient-to-r from-[#6D28D9] to-[#8B5CF6] flex items-center justify-between flex-shrink-0">
      <div class="flex items-center space-x-3">
        <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-lg">🧠</div>
        <div>
          <p class="text-sm font-semibold text-white">EverCare Assistant</p>
          <span class="flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-green-300 animate-pulse"></span>
            <p class="text-[10px] text-white/70">Alzheimer's Care Specialist</p>
          </span>
        </div>
      </div>
      <button type="button" (click)="toggleAssistant()"
        class="text-white/60 hover:text-white text-lg leading-none">✕</button>
    </div>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto px-4 py-3 space-y-3 bg-[#FAFAFA]" #messageContainer>
      <ng-container *ngFor="let msg of messages">

        <!-- Assistant bubble -->
        <div *ngIf="msg.role === 'assistant'" class="flex items-end gap-2">
          <div class="w-6 h-6 rounded-full bg-purple-100 flex items-center justify-center text-xs flex-shrink-0">🧠</div>
          <div class="max-w-[80%] bg-white border border-purple-100 rounded-2xl rounded-bl-sm px-3 py-2 text-sm text-gray-700 shadow-sm">
            <ng-container *ngIf="!msg.loading; else loadingDots">
              {{ msg.content }}
            </ng-container>
            <ng-template #loadingDots>
              <div class="flex gap-1 py-1">
                <span class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay:0s"></span>
                <span class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay:.15s"></span>
                <span class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay:.3s"></span>
              </div>
            </ng-template>
          </div>
        </div>

        <!-- User bubble -->
        <div *ngIf="msg.role === 'user'" class="flex justify-end">
          <div class="max-w-[80%] bg-[#7C3AED] text-white rounded-2xl rounded-br-sm px-3 py-2 text-sm shadow-sm">
            {{ msg.content }}
          </div>
        </div>

      </ng-container>
    </div>

    <!-- Quick Actions -->
    <div class="px-4 py-2 bg-white border-t border-gray-100 flex-shrink-0">
      <div class="flex gap-2 overflow-x-auto pb-1">
        <button type="button"
          class="whitespace-nowrap px-3 py-1 rounded-full bg-purple-50 text-[#7C3AED] text-xs font-medium hover:bg-purple-100"
          (click)="sendQuickMessage('I want to take a memory assessment')">
          🧩 Memory Test
        </button>
        <button type="button"
          class="whitespace-nowrap px-3 py-1 rounded-full bg-purple-50 text-[#7C3AED] text-xs font-medium hover:bg-purple-100"
          (click)="sendQuickMessage('What activities do you recommend for today?')">
          📅 Today's Activities
        </button>
        <button type="button"
          class="whitespace-nowrap px-3 py-1 rounded-full bg-purple-50 text-[#7C3AED] text-xs font-medium hover:bg-purple-100"
          (click)="sendQuickMessage('Help me with my medication reminders')">
          💊 Medications
        </button>
        <button type="button"
          class="whitespace-nowrap px-3 py-1 rounded-full bg-red-50 text-red-500 text-xs font-medium hover:bg-red-100"
          (click)="sendQuickMessage('I need to contact my caregiver')">
          🆘 Caregiver
        </button>
      </div>
    </div>

    <!-- Input -->
    <div class="px-4 py-3 bg-white border-t border-gray-100 flex gap-2 items-end flex-shrink-0">
      <textarea
        [(ngModel)]="userInput"
        (keydown)="onKeyDown($event)"
        placeholder="Ask me anything…"
        rows="1"
        class="flex-1 resize-none rounded-xl border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-300 placeholder-gray-400">
      </textarea>
      <button type="button"
        (click)="sendMessage()"
        [disabled]="!userInput.trim() || isLoading"
        class="w-9 h-9 rounded-full bg-[#7C3AED] text-white flex items-center justify-center hover:bg-[#6D28D9] disabled:opacity-40 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
          <path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- FAB Button -->
  <button type="button"
    class="relative inline-flex items-center justify-center w-14 h-14 rounded-full bg-gradient-to-br from-[#6D28D9] to-[#A78BFA] shadow-xl text-white hover:scale-105 transition-transform focus:outline-none"
    (click)="toggleAssistant()"
    aria-label="Open EverCare assistant">
    <span class="text-2xl">{{ isOpen ? '✕' : '💬' }}</span>
    <span class="absolute -top-1 -right-1 px-1.5 py-0.5 rounded-full bg-[#EF4444] text-[9px] font-bold">AI</span>
  </button>

  <app-welcome-popup
    *ngIf="showWelcome"
    (completed)="handleWelcomeCompleted()"
    (skipped)="handleWelcomeSkipped()">
  </app-welcome-popup>

  <app-alzheimers-assessment
    *ngIf="showAssessment"
    (closed)="closeAssessment()">
  </app-alzheimers-assessment>

</div>
