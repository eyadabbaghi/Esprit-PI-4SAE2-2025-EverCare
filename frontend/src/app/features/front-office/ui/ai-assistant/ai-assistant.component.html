<div class="ai-assistant-shell">
  <div *ngIf="isOpen" class="assistant-panel">
    <div class="assistant-glow"></div>

    <header class="assistant-header">
      <div class="assistant-brand">
        <div class="assistant-avatar assistant-avatar-lg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <rect x="5" y="8" width="14" height="11" rx="3" stroke-width="2"></rect>
            <path d="M12 4v4M9 13h.01M15 13h.01M10 17h4" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </div>
        <div>
          <p class="assistant-title">EverCare Assistant</p>
          <span class="assistant-specialty">
            <span class="assistant-pulse-dot"></span>
            Alzheimer's Care Specialist
          </span>
        </div>
      </div>

      <button type="button" (click)="toggleAssistant()" class="assistant-close" aria-label="Close assistant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M6 6l12 12M18 6 6 18" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      </button>
    </header>

    <div class="assistant-messages" #messageContainer>
      <ng-container *ngFor="let msg of messages">
        <div *ngIf="msg.role === 'assistant'" class="message-row assistant-row">
          <div class="assistant-avatar message-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M9 4h6M12 4v3" stroke-width="2" stroke-linecap="round"></path>
              <rect x="5" y="7" width="14" height="12" rx="4" stroke-width="2"></rect>
              <path d="M9 12h.01M15 12h.01M10 16h4" stroke-width="2" stroke-linecap="round"></path>
            </svg>
          </div>

          <div class="message-bubble assistant-bubble">
            <ng-container *ngIf="!msg.loading; else loadingDots">
              {{ msg.content }}
            </ng-container>
            <ng-template #loadingDots>
              <div class="typing-dots" aria-label="Assistant is typing">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </ng-template>
          </div>
        </div>

        <div *ngIf="msg.role === 'user'" class="message-row user-row">
          <div class="message-bubble user-bubble">
            {{ msg.content }}
          </div>
        </div>
      </ng-container>
    </div>

    <div class="quick-actions">
      <button type="button" class="quick-action" (click)="sendQuickMessage('I want to take a memory assessment')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M8 3h8v4H8zM6 7h12v14H6zM9 11h6M9 15h4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        Memory Test
      </button>
      <button type="button" class="quick-action" (click)="sendQuickMessage('What activities do you recommend for today?')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M7 3v4M17 3v4M4 9h16M5 5h14v16H5z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        Today's Activities
      </button>
      <button type="button" class="quick-action" (click)="sendQuickMessage('Help me with my medication reminders')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="m10 21 11-11a5 5 0 0 0-7-7L3 14a5 5 0 0 0 7 7Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="m8 12 4 4" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        Medications
      </button>
      <button type="button" class="quick-action urgent" (click)="sendQuickMessage('I need to contact my caregiver')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M12 21s7-4.5 7-11a7 7 0 1 0-14 0c0 6.5 7 11 7 11Z" stroke-width="2" stroke-linejoin="round"></path>
          <path d="M12 8v4M12 15h.01" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        Caregiver
      </button>
    </div>

    <div class="assistant-input-row">
      <textarea
        [(ngModel)]="userInput"
        (keydown)="onKeyDown($event)"
        placeholder="Ask me anything..."
        rows="1"
        class="assistant-input">
      </textarea>
      <button
        type="button"
        (click)="sendMessage()"
        [disabled]="!userInput.trim() || isLoading"
        class="assistant-send"
        aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z" />
        </svg>
      </button>
    </div>
  </div>

  <button
    type="button"
    class="assistant-fab"
    [class.assistant-fab-open]="isOpen"
    (click)="toggleAssistant()"
    aria-label="Open EverCare assistant">
    <span class="assistant-fab-ring"></span>
    <span class="assistant-fab-icon">
      <svg *ngIf="!isOpen; else closeFabIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M12 3v3" stroke-width="2" stroke-linecap="round"></path>
        <rect x="5" y="6" width="14" height="12" rx="4" stroke-width="2"></rect>
        <path d="M8 10h.01M16 10h.01M9.5 14c1.4 1 3.6 1 5 0" stroke-width="2" stroke-linecap="round"></path>
        <path d="M3 11v3M21 11v3" stroke-width="2" stroke-linecap="round"></path>
        <path d="M9 21h6" stroke-width="2" stroke-linecap="round"></path>
      </svg>
      <ng-template #closeFabIcon>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M6 6l12 12M18 6 6 18" stroke-width="2.25" stroke-linecap="round"></path>
        </svg>
      </ng-template>
    </span>
    <span class="assistant-ai-badge">AI</span>
  </button>

  <app-welcome-popup
    *ngIf="showWelcome"
    (completed)="handleWelcomeCompleted()"
    (skipped)="handleWelcomeSkipped()">
  </app-welcome-popup>

  <app-alzheimers-assessment
    *ngIf="showAssessment"
    (closed)="closeAssessment()">
  </app-alzheimers-assessment>
</div>
