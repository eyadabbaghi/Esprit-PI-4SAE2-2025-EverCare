<nav class="bg-white border-b border-[#C4B5FD] sticky top-0 z-40 shadow-sm">
  <div class="navbar-container w-full px-3 sm:px-4 lg:px-5">
    <div class="navbar-row flex items-center justify-between h-16">

      <!-- Logo -->
      <button type="button" class="brand-mark flex items-center gap-1.5 cursor-pointer" (click)="navigate('/')">
        <img src="/logo.png" alt="EverCare logo" class="brand-logo h-9 w-9 rounded-xl object-contain" />
        <span class="brand-title" aria-label="EverCare">
          Ever<span>Care</span>
        </span>
      </button>

      <!-- Desktop Navigation -->
      <div class="desktop-nav hidden md:flex items-center">
        <button
          *ngFor="let item of navItems"
          [attr.id]="'tutorial-nav-' + item.id"
          type="button"
          (click)="navigate(item.route)"
          [ngClass]="isActive(item.route) ? 'bg-[#F3E8FF] text-[#7C3AED]' : 'text-[#6B5B8C] hover:bg-[#F3E8FF] hover:text-[#7C3AED]'"
          class="nav-link flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium transition"
        >
          <!-- Activities -->
          <ng-container *ngIf="item.id === 'activities'">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path clip-rule="evenodd" d="m9.61954 6.62394c-.01804.0188-.08318.0875-.19772.27449-.17279.28208-.38002.69503-.68529 1.30558l-1.62348 3.24699c-.0106.0212-.02123.0425-.03191.064-.12656.2547-.26165.5266-.47467.7352-.18531.1815-.40866.3196-.65388.4042-.28187.0972-.58546.0964-.86986.0957-.02401 0-.04788-.0001-.07158-.0001h-2.01115c-.41421 0-.75-.3358-.75-.75s.33579-.75.75-.75h2.01115c.18855 0 .29609-.0003.37695-.0054.04979-.0031.07052-.0071.07597-.0085.03461-.012.06614-.0315.09238-.057.00362-.0043.01652-.0211.04157-.0642.04067-.0701.08906-.1661.17339-.3348l1.63973-3.27941c.28491-.56985.52083-1.04172.73158-1.38578.19655-.32087.46988-.70707.89812-.87676.53844-.21335 1.14756-.14648 1.62686.17859.3813.25854.5643.69484.6866 1.05071.1311.38159.259.89341.4135 1.5115l1.4076 5.63025c.2311.9246.3944 1.5756.5429 2.0253.0739.2239.1336.3643.1801.4486.0065.0117.0122.0213.0169.029.0547.0197.1147.0197.1694 0 .0047-.0077.0104-.0173.0169-.029.0465-.0843.1062-.2247.1801-.4486.1485-.4497.3118-1.1007.5429-2.0253l.1448-.5791c.0073-.029.0145-.0582.0217-.0876.0842-.3413.1738-.7042.3889-.9914.1865-.2491.436-.4439.7229-.5645.3308-.1389.7046-.1378 1.0561-.1368.0303.0001.0604.0002.0902.0002h3.7508c.4142 0 .75.3358.75.75s-.3358.75-.75.75h-3.7508c-.234 0-.37.0005-.4716.0078-.0622.0045-.0882.0104-.0951.0123-.0399.0171-.0747.0442-.1009.0788-.0035.0062-.0156.03-.035.0893-.0318.0968-.0652.2286-.122.4557l-.1531.6126c-.2209.8836-.3973 1.5892-.5654 2.0982-.0854.2587-.1791.5002-.2915.7036-.1085.1965-.2717.4271-.5294.5782-.5466.3205-1.2238.3205-1.7704 0-.2577-.1511-.4209-.3817-.5294-.5782-.1124-.2034-.2061-.4449-.2915-.7036-.1681-.509-.3445-1.2146-.5654-2.0982l-1.4071-5.62852c-.1655-.66223-.2783-1.1103-.38575-1.42315-.07124-.20738-.11993-.28857-.13346-.31084-.05611-.02962-.12145-.03679-.18265-.02005zm6.96316 6.22326c0-.0001-.0004.0008-.0011.0017zm.0978-.0764c0-.0001.0009-.0003.002-.0007zm-2.7465 3.3686s-.0002-.0003-.0007-.0009zm-8.37863-4.9592c.00001 0 .00043-.0005.00108-.0011z" fill-rule="evenodd"></path>
            </svg>
          </ng-container>

          <!-- Alerts -->
          <ng-container *ngIf="item.id === 'alerts'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M10.29 3.86l-7.4 12.8A1 1 0 003.7 18h16.6a1 1 0 00.81-1.54l-7.4-12.8a1 1 0 00-1.72 0zM12 9v2m0 4h.01"/>
            </svg>
          </ng-container>

          <!-- Doctors -->
          <ng-container *ngIf="item.id === 'doctors'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M8 4v5a4 4 0 0 0 8 0V4M6 4h4M14 4h4M12 13v3a4 4 0 0 0 8 0v-1"/>
              <circle cx="20" cy="15" r="2" stroke-width="1.8"/>
            </svg>
          </ng-container>

          <!-- Appointments -->
          <ng-container *ngIf="item.id === 'appointments'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7H3v12a2 2 0 002 2z"/>
            </svg>
          </ng-container>

          <!-- Medical Folder / Medical Record -->
          <ng-container *ngIf="item.id === 'medical-folder' || item.id === 'medical-record'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
            </svg>
          </ng-container>

          <!-- Blog -->
          <ng-container *ngIf="item.id === 'blog'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M19 21H5a2 2 0 01-2-2V7l4-4h12a2 2 0 012 2v14a2 2 0 01-2 2z"/>
            </svg>
          </ng-container>

          <!-- Messages / Communication -->
          <ng-container *ngIf="item.id === 'messages' || item.id === 'communication'">
            <svg class="w-4 h-4" viewBox="0 0 122.88 107.09" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M63.08,0h.07C79.93.55,95,6.51,105.75,15.74c11,9.39,17.52,22.16,17.11,36.09v0a42.67,42.67,0,0,1-7.58,22.87A55,55,0,0,1,95.78,92a73.3,73.3,0,0,1-28.52,8.68,62.16,62.16,0,0,1-27-3.63L6.72,107.09,16.28,83a49.07,49.07,0,0,1-10.91-13A40.16,40.16,0,0,1,.24,45.55a44.84,44.84,0,0,1,9.7-23A55.62,55.62,0,0,1,26.19,8.83,67,67,0,0,1,43.75,2,74.32,74.32,0,0,1,63.07,0Zm24.18,42a7.78,7.78,0,1,1-7.77,7.78,7.78,7.78,0,0,1,7.77-7.78Zm-51.39,0a7.78,7.78,0,1,1-7.78,7.78,7.79,7.79,0,0,1,7.78-7.78Zm25.69,0a7.78,7.78,0,1,1-7.77,7.78,7.78,7.78,0,0,1,7.77-7.78Zm1.4-36h-.07A68.43,68.43,0,0,0,45.14,7.85a60.9,60.9,0,0,0-16,6.22A49.65,49.65,0,0,0,14.66,26.32,38.87,38.87,0,0,0,6.24,46.19,34.21,34.21,0,0,0,10.61,67,44.17,44.17,0,0,0,21.76,79.67l1.76,1.39L16.91,97.71l23.56-7.09,1,.38a56,56,0,0,0,25.32,3.6,67,67,0,0,0,26.16-8A49,49,0,0,0,110.3,71.36a36.86,36.86,0,0,0,6.54-19.67v0c.35-12-5.41-23.1-15-31.33C92.05,11.94,78.32,6.52,63,6.06Z"/>
            </svg>
          </ng-container>

          <!-- Daily Me -->
          <ng-container *ngIf="item.id === 'daily' || item.id === 'daily-me'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </ng-container>

          <!-- Prescriptions -->
          <ng-container *ngIf="item.id === 'prescriptions'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M9 12h6m-3-3v6M7 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 3h6a1 1 0 010 2H9a1 1 0 010-2z"/>
            </svg>
          </ng-container>

          <!-- Cognitive Stimulation / Cognitive Care -->
          <ng-container *ngIf="item.id === 'cognitive-stimulation'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
          </ng-container>

          <!-- TRACKING (new) -->
          <ng-container *ngIf="item.id === 'tracking'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
            </svg>
          </ng-container>

          <!-- Home (fallback) -->
          <ng-container *ngIf="item.id === 'home'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M3 10.5L12 3l9 7.5M5 9.5V20a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V9.5" />
            </svg>
          </ng-container>

          {{ item.label }}
        </button>
      </div>

      <!-- Right Section (unchanged, but ensure profilePicture safe) -->
      <div class="nav-actions flex items-center space-x-2">

        <!-- Notifications Bell (unchanged) -->
        <div class="relative">
          <button id="notifications-button" type="button"
                  class="relative inline-flex items-center justify-center w-9 h-9 rounded-full hover:bg-[#F3E8FF] transition-colors"
                  (click)="openAlerts()">
            <svg class="w-5 h-5 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                 [class.bell-shake]="bellShaking">
              <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                    d="M15 17h5l-1.4-1.4A2 2 0 0118 14V11a6 6 0 10-12 0v3a2 2 0 01-.6 1.6L4 17h5m6 0a3 3 0 11-6 0"/>
            </svg>
            <span *ngIf="unreadCount > 0"
                  class="absolute -top-1 -right-1 w-5 h-5 bg-[#C06C84] rounded-full text-white text-xs flex items-center justify-center font-semibold">
              {{ unreadCount }}
            </span>
          </button>

          <!-- Notifications Dropdown -->
          <div *ngIf="notificationsOpen" id="notifications-dropdown"
               class="notification-menu absolute right-0 mt-2 w-80 max-w-[calc(100vw-2rem)] bg-white border border-[#E5E7EB] rounded-xl shadow-lg overflow-hidden z-50">
            <div class="notification-menu-header px-4 py-3 flex items-center justify-between">
              <div>
                <span class="text-sm font-semibold text-[#2D1B4E]">Notifications</span>
                <p class="text-[11px] text-[#6B5B8C]">Latest care updates</p>
              </div>
              <div class="flex items-center gap-2">
                <button type="button" class="text-xs text-[#7C3AED] hover:underline"
                        *ngIf="unreadCount > 0" (click)="markAllAsRead()">Mark all as read</button>
                <button type="button" class="text-xs text-[#C06C84] hover:underline"
                        *ngIf="activityNotifications.length > 0 || taskNotifications.length > 0"
                        (click)="clearAllNotifications()">Clear all</button>
              </div>
            </div>
            <div class="notification-list border-t border-[#E5E7EB] max-h-96 overflow-y-auto">
              <!-- Task notifications -->
              <ng-container *ngIf="taskNotifications.length > 0">
                <div class="notification-group-label px-4 py-1 bg-[#F9FAFB]">
                  <span class="text-[10px] font-semibold text-[#6B5B8C] uppercase tracking-wide">Tasks</span>
                </div>
                <button *ngFor="let notification of taskNotifications"
                        class="notification-row w-full text-left px-4 py-3 border-b border-[#E5E7EB] hover:bg-[#F9FAFB]"
                        [ngClass]="{ 'bg-[#F3E8FF]': !notification.read }"
                        (click)="handleTaskNotificationClick(notification)">
                  <div class="flex items-start gap-3">
                    <div class="notification-icon text-[#7C3AED] bg-[#F3E8FF] border-[#DDD6FE]">
                      <svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M12 8v4l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                      </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-start justify-between gap-2 mb-1">
                        <p class="text-xs font-semibold text-[#2D1B4E]">{{ notification.title }}</p>
                        <span *ngIf="notification.severity" class="text-[10px] px-2 py-0.5 rounded-full"
                              [ngClass]="getSeverityClasses(notification.severity)">{{ notification.severity }}</span>
                      </div>
                      <p class="text-xs text-[#6B5B8C] line-clamp-2">{{ notification.message }}</p>
                      <p class="text-[10px] text-[#9CA3AF] mt-1">{{ notification.time }}</p>
                    </div>
                  </div>
                </button>
              </ng-container>
              <!-- Activity notifications -->
              <ng-container *ngIf="activityNotifications.length > 0">
                <div class="notification-group-label px-4 py-1 bg-[#F9FAFB]">
                  <span class="text-[10px] font-semibold text-[#6B5B8C] uppercase tracking-wide">Activity and blog</span>
                </div>
                <button *ngFor="let n of activityNotifications"
                        class="notification-row w-full text-left px-4 py-3 border-b border-[#E5E7EB] last:border-0 hover:bg-[#F9FAFB] flex gap-3"
                        [ngClass]="{ 'bg-[#F3E8FF]': !n.read }" (click)="handleActivityNotificationClick(n)">
                  <div class="notification-icon" [ngClass]="getNotificationIconClasses(n)">
                    <ng-container [ngSwitch]="getNotificationKind(n)">
                      <svg *ngSwitchCase="'blog'" class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M5 4h10l4 4v12H5V4Z" stroke-width="2" stroke-linejoin="round"></path>
                        <path d="M15 4v5h5M8 13h8M8 17h6" stroke-width="2" stroke-linecap="round"></path>
                      </svg>
                      <svg *ngSwitchCase="'appointment'" class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M8 3v4M16 3v4M4 9h16M6 5h12a2 2 0 0 1 2 2v12H4V7a2 2 0 0 1 2-2Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M9 14h.01M12 14h.01M15 14h.01M9 17h.01M12 17h.01" stroke-width="2" stroke-linecap="round"></path>
                      </svg>
                      <svg *ngSwitchCase="'alert'" class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M10.3 4.2 2.8 17a2 2 0 0 0 1.7 3h15a2 2 0 0 0 1.7-3L13.7 4.2a2 2 0 0 0-3.4 0Z" stroke-width="2"></path>
                        <path d="M12 9v4M12 17h.01" stroke-width="2" stroke-linecap="round"></path>
                      </svg>
                      <ng-container *ngSwitchDefault>
                        <svg *ngIf="getNotificationAction(n) === 'UPDATED'; else createdOrDeletedNotificationIcon" class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                          <path d="M4 20h4l10-10a2.8 2.8 0 0 0-4-4L4 16v4Z" stroke-width="2" stroke-linejoin="round"></path>
                        </svg>
                        <ng-template #createdOrDeletedNotificationIcon>
                          <svg *ngIf="getNotificationAction(n) === 'DELETED'; else activityCreatedNotificationIcon" class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="M3 6h18M8 6V4h8v2m-9 0 1 15h8l1-15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                          </svg>
                        </ng-template>
                        <ng-template #activityCreatedNotificationIcon>
                          <svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"></path>
                          </svg>
                        </ng-template>
                      </ng-container>
                    </ng-container>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2">
                      <p class="text-xs font-semibold text-[#2D1B4E]">{{ getNotificationTitle(n) }}</p>
                      <span class="notification-kind">{{ getNotificationKind(n) }}</span>
                    </div>
                    <p class="text-xs text-[#6B5B8C] line-clamp-2">{{ getNotificationBody(n) }}</p>
                    <p class="text-[10px] text-[#9CA3AF] mt-1">{{ n.timestamp | date:'short' }}</p>
                  </div>
                </button>
              </ng-container>
              <div *ngIf="activityNotifications.length === 0 && taskNotifications.length === 0"
                   class="py-6 text-center text-[#6B5B8C] text-sm">No notifications</div>
            </div>
            <button type="button" class="w-full text-center text-xs text-[#7C3AED] py-2 hover:bg-[#F3E8FF]"
                    (click)="navigate('/alerts')">View all alerts</button>
          </div>
        </div>

        <!-- Auth-aware section (with safe profilePicture handling) -->
        <ng-container *ngIf="authResolved; else authLoading">
          <div *ngIf="user" class="hidden md:flex items-center space-x-2 relative">
            <button id="profile-button" type="button"
                    class="profile-trigger flex items-center space-x-2 px-2 py-1 rounded-full hover:bg-[#F3E8FF] transition-all duration-200"
                    (click)="toggleProfileMenu()">
              <div class="profile-avatar w-9 h-9 rounded-full bg-[#C4B5FD] flex items-center justify-center text-sm font-semibold overflow-hidden">
                <ng-container *ngIf="user.profilePicture; else initials">
                  <img [src]="user.profilePicture" alt="Profile" class="w-full h-full object-cover" />
                </ng-container>
                <ng-template #initials>
                  <span class="text-[#7C3AED]">{{ getInitials(user.name) }}</span>
                </ng-template>
              </div>
              <div class="profile-copy flex flex-col text-left">
                <span class="text-sm font-medium text-[#2D1B4E]">{{ user.name }}</span>
                <span class="text-[11px] text-[#6B5B8C] capitalize">{{ user.role }}</span>
              </div>
            </button>

            <div id="profile-dropdown" *ngIf="profileOpen"
                 class="profile-menu absolute right-0 top-full mt-3 w-64 bg-white border border-[#E5E7EB] rounded-xl shadow-lg overflow-hidden z-50 transition-all duration-200">
              <button class="w-full text-left px-4 py-2.5 text-sm text-[#2D1B4E] hover:bg-[#F3E8FF] flex items-center gap-2"
                      (click)="goToProfile()">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path d="M14.3365 12.3466L14.0765 11.9195C13.9082 12.022 13.8158 12.2137 13.8405 12.4092C13.8651 12.6046 14.0022 12.7674 14.1907 12.8249L14.3365 12.3466ZM9.6634 12.3466L9.80923 12.8249C9.99769 12.7674 10.1348 12.6046 10.1595 12.4092C10.1841 12.2137 10.0917 12.022 9.92339 11.9195L9.6634 12.3466ZM4.06161 19.002L3.56544 18.9402L4.06161 19.002ZM19.9383 19.002L20.4345 18.9402L19.9383 19.002ZM16 8.5C16 9.94799 15.2309 11.2168 14.0765 11.9195L14.5965 12.7737C16.0365 11.8971 17 10.3113 17 8.5H16ZM12 4.5C14.2091 4.5 16 6.29086 16 8.5H17C17 5.73858 14.7614 3.5 12 3.5V4.5ZM7.99996 8.5C7.99996 6.29086 9.79082 4.5 12 4.5V3.5C9.23854 3.5 6.99996 5.73858 6.99996 8.5H7.99996ZM9.92339 11.9195C8.76904 11.2168 7.99996 9.948 7.99996 8.5H6.99996C6.99996 10.3113 7.96342 11.8971 9.40342 12.7737L9.92339 11.9195ZM9.51758 11.8683C6.36083 12.8309 3.98356 15.5804 3.56544 18.9402L4.55778 19.0637C4.92638 16.1018 7.02381 13.6742 9.80923 12.8249L9.51758 11.8683ZM3.56544 18.9402C3.45493 19.8282 4.19055 20.5 4.99996 20.5V19.5C4.70481 19.5 4.53188 19.2719 4.55778 19.0637L3.56544 18.9402ZM4.99996 20.5H19V19.5H4.99996V20.5ZM19 20.5C19.8094 20.5 20.545 19.8282 20.4345 18.9402L19.4421 19.0637C19.468 19.2719 19.2951 19.5 19 19.5V20.5ZM20.4345 18.9402C20.0164 15.5804 17.6391 12.8309 14.4823 11.8683L14.1907 12.8249C16.9761 13.6742 19.0735 16.1018 19.4421 19.0637L20.4345 18.9402Z" fill="currentColor"/>
                </svg>
                My Profile
              </button>
              <button class="w-full text-left px-4 py-2.5 text-sm text-[#2D1B4E] hover:bg-[#F3E8FF] flex items-center gap-2 border-t border-[#F3E8FF]"
                      (click)="startTutorial()">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6v6l4 2m4-2a8 8 0 11-16 0 8 8 0 0116 0z"/>
                </svg>
                Start tutorial
              </button>
              <button class="w-full text-left px-4 py-2 text-sm text-[#C06C84] hover:bg-red-50 flex items-center gap-2 border-t border-[#F3E8FF]"
                      (click)="logout()">
                <svg class="w-4 h-4 text-[#C06C84]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M17 16l4-4m0 0l-4-4m4 4H7"/>
                </svg>
                Log out
              </button>
            </div>
          </div>

          <div *ngIf="!user" class="hidden md:block">
            <button type="button"
                    class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-full bg-transparent text-[#7C3AED] text-xs font-semibold border border-[#C4B5FD] hover:bg-[#F3E8FF]"
                    (click)="navigate('/login')">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                      d="M15 12H3m0 0l4-4m-4 4l4 4m6-12h6v18h-6"/>
              </svg>
              Log In
            </button>
          </div>
        </ng-container>

        <ng-template #authLoading>
          <div class="hidden md:block">
            <div class="w-24 h-9 bg-gray-100 rounded-full animate-pulse"></div>
          </div>
        </ng-template>

        <!-- Mobile Menu Toggle -->
        <button type="button"
                class="md:hidden inline-flex items-center justify-center w-9 h-9 rounded-full hover:bg-[#F3E8FF]"
                (click)="toggleMobileMenu()">
          <svg *ngIf="!isMobileMenuOpen" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round"></path></svg>
          <svg *ngIf="isMobileMenuOpen" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"></path></svg>
        </button>
      </div>
    </div>

    <!-- Task Alert Banner -->
    <div *ngIf="showTaskAlert"
         class="mt-3 rounded-xl border border-[#C4B5FD] bg-[#F8F5FF] px-4 py-3 text-sm text-[#2D1B4E] flex items-start justify-between gap-3">
      <div>
        <div class="font-semibold">{{ taskAlertTitle }}</div>
        <div>{{ taskAlertMessage }}</div>
      </div>
      <button type="button" class="text-[#7C3AED] hover:text-[#6D28D9]" (click)="closeTaskAlert()" aria-label="Close alert">
        <svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMobileMenuOpen" class="md:hidden border-t border-[#C4B5FD] bg-white px-4 pb-4 pt-3 space-y-2">
      <button *ngFor="let item of navItems" type="button"
              [attr.id]="'tutorial-mobile-nav-' + item.id"
              class="w-full flex items-center justify-start px-3 py-2 rounded-md text-sm font-medium"
              [ngClass]="isActive(item.route) ? 'bg-[#F3E8FF] text-[#7C3AED]' : 'text-[#6B5B8C] hover:bg-[#F3E8FF] hover:text-[#7C3AED]'"
              (click)="navigate(item.route)">
        {{ item.label }}
      </button>
      <div *ngIf="user" class="border-t border-[#E5E7EB] pt-2 mt-2">
        <div class="px-3 py-2 text-sm text-[#2D1B4E] font-medium">{{ user.name }} - {{ user.role }}</div>
        <button type="button"
                class="w-full flex items-center justify-start px-3 py-2 text-sm text-[#2D1B4E] hover:bg-[#F3E8FF]"
                (click)="startTutorial()">Start tutorial</button>
        <button type="button"
                class="w-full flex items-center justify-start px-3 py-2 text-sm text-[#C06C84] hover:bg-red-50"
                (click)="logout()">Log out</button>
      </div>
      <div *ngIf="authResolved && !user" class="border-t border-[#E5E7EB] pt-2 mt-2">
        <button type="button"
                class="w-full flex items-center justify-start px-3 py-2 text-sm text-[#7C3AED] bg-transparent"
                (click)="navigate('/login')">Log In</button>
      </div>
    </div>

  </div>
</nav>
