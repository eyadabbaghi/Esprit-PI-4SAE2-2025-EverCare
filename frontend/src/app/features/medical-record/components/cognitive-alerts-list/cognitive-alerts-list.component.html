<div class="alerts-container">
  <div *ngIf="loading" class="text-center p-4">
    <div class="spinner-border spinner-border-sm me-2"></div>
    Chargement des alertes...
  </div>
  
  <div *ngIf="!loading && alerts.length === 0" class="text-center p-5 text-muted">
    <i class="fas fa-bell-slash fa-3x mb-3"></i>
    <p>Aucune alerte cognitive active</p>
  </div>

  <div *ngFor="let alert of alerts | keyvalue" class="alert mb-3 shadow-sm" [ngClass]="getSeverityClass(alert.value.severity)">
    <div class="alert-header d-flex justify-content-between align-items-start">
      <h6 class="mb-1 flex-grow-1">
        <i class="fas fa-exclamation-triangle me-2"></i>
        {{ alert.value.reason }}
      </h6>
      <span class="badge fs-6" [ngClass]="'bg-' + getStatusClass(alert.value.status)">
        {{ getStatusLabel(alert.value.status) }}
      </span>
    </div>
    
    <div class="alert-body small text-muted">
      <div class="row g-1">
        <div class="col-auto">
          <i class="fas fa-calendar"></i> {{ alert.value.createdAt | date:'short' }}
        </div>
        <div class="col-auto" *ngIf="alert.value.patientId">
          <i class="fas fa-user"></i> {{ alert.value.patientId }}
        </div>
      </div>
    </div>

    <div class="alert-actions mt-2" *ngIf="alert.value.status === 'ACTIVE'">
      <button class="btn btn-outline-warning btn-sm me-2" (click)="onAcknowledge(alert.value.id)">
        <i class="fas fa-check"></i> Acknowledger
      </button>
      <button class="btn btn-outline-success btn-sm" (click)="onResolve(alert.value.id)">
        <i class="fas fa-check-double"></i> Résoudre
      </button>
    </div>
  </div>
</div>
