<div class="bg-white rounded-xl border border-[#C4B5FD] shadow-sm overflow-hidden">

  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-[#F3E8FF]">
    <h3 class="font-semibold text-[#2D1B4E]">{{ title }}</h3>
    <span class="text-xs font-medium text-[#7C3AED] bg-[#F3E8FF] px-2 py-1 rounded-full">
      {{ prescriptions.length }}
    </span>
  </div>

  <!-- Loading state -->
  <div *ngIf="loading" class="p-8 flex flex-col items-center justify-center space-y-3">
    <div class="w-8 h-8 border-2 border-[#7C3AED] border-t-transparent rounded-full animate-spin"></div>
    <p class="text-sm text-[#6B5B8C]">Loading prescriptions...</p>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && prescriptions.length === 0"
       class="p-8 flex flex-col items-center justify-center text-center space-y-2">
    <span class="text-4xl"><svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m10.5 20.5-7-7a3.5 3.5 0 0 1 5-5l7 7a3.5 3.5 0 0 1-5 5Z" stroke-width="2"></path><path d="m8.5 8.5 7 7" stroke-width="2"></path></svg></span>
    <p class="text-sm text-[#6B5B8C]">{{ emptyMessage }}</p>
  </div>

  <!-- List -->
  <div *ngIf="!loading && prescriptions.length > 0"
       class="p-3 space-y-3"
       [class.max-h-[520px]]="scrollable"
       [class.overflow-y-auto]="scrollable">

    <app-prescription-card
      *ngFor="let prescription of prescriptions"
      [prescription]="prescription"
      [showActions]="showActions"
      (onView)="onView.emit($event)"
      (onRenew)="onRenew.emit($event)"
      (onCancel)="onCancel.emit($event)"
      (onDownloadPdf)="onDownloadPdf.emit($event)">
    </app-prescription-card>

  </div>

</div>
