<div class="min-h-screen bg-gradient-to-br from-[#FAF8FC] to-[#F3E8FF] p-4 md:p-8">
  <div class="max-w-7xl mx-auto space-y-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-3xl font-bold text-[#2D1B4E]">Prescriptions</h1>
        <p class="text-[#6B5B8C] mt-1">
          Dr. {{ currentUser?.name }}
          <span *ngIf="currentUser?.specialization"> · {{ currentUser?.specialization }}</span>
        </p>
      </div>

      <!-- Tabs -->
      <div class="flex space-x-2 bg-white p-1 rounded-lg border border-[#C4B5FD]">
        <button class="px-4 py-2 rounded-md text-sm transition-colors"
                [class.bg-[#7C3AED]]="activeTab === 'issued'"
                [class.text-white]="activeTab === 'issued'"
                [class.text-[#2D1B4E]]="activeTab !== 'issued'"
                (click)="activeTab = 'issued'">
          <svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke-width="2" stroke-linecap="round"></path></svg> Issued
        </button>

        <button class="px-4 py-2 rounded-md text-sm transition-colors"
                [class.bg-[#7C3AED]]="activeTab === 'new-prescription'"
                [class.text-white]="activeTab === 'new-prescription'"
                [class.text-[#2D1B4E]]="activeTab !== 'new-prescription'"
                (click)="activeTab = 'new-prescription'">
          <svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M4 20h4l10-10a2.8 2.8 0 0 0-4-4L4 16v4Z" stroke-width="2" stroke-linejoin="round"></path></svg> New Prescription
        </button>
      </div>

      <a routerLink="/prescriptions/doctor/manage"
         class="rounded-lg border border-[#C4B5FD] bg-white px-4 py-2 text-sm font-medium text-[#2D1B4E]">
        Advanced Manage
      </a>

    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="fixed inset-0 bg-black/20 z-50 flex items-center justify-center">
      <div class="bg-white rounded-lg p-4 flex items-center space-x-3">
        <div class="w-6 h-6 border-2 border-[#7C3AED] border-t-transparent rounded-full animate-spin"></div>
        <span class="text-[#2D1B4E]">Loading...</span>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage"
         class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg flex items-center justify-between">
      <span>{{ errorMessage }}</span>
      <button (click)="errorMessage = ''"><svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"></path></svg></button>
    </div>

    <!-- TAB: Issued -->
    <div *ngIf="activeTab === 'issued'" class="space-y-6">

      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white rounded-xl border border-[#C4B5FD] shadow-sm p-4">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-[#6B5B8C]">Total Issued</p>
              <p class="text-2xl font-bold text-[#2D1B4E]">{{ totalIssued }}</p>
            </div>
            <div class="w-10 h-10 bg-[#F3E8FF] rounded-full flex items-center justify-center">
              <span class="text-lg"><svg class="inline-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke-width="2" stroke-linecap="round"></path></svg></span>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-[#C4B5FD] shadow-sm p-4">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-[#6B5B8C]">Active</p>
              <p class="text-2xl font-bold text-[#2D1B4E]">{{ activeCount }}</p>
            </div>
            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
              <span class="text-lg"><svg class="inline-svg-icon text-green-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m5 12 4 4L19 6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-[#C4B5FD] shadow-sm p-4">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-[#6B5B8C]">Expiring Soon</p>
              <p class="text-2xl font-bold text-[#2D1B4E]">{{ expiringCount }}</p>
            </div>
            <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">
              <span class="text-lg"><svg class="inline-svg-icon text-orange-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M10.3 4.2 2.8 17a2 2 0 0 0 1.7 3h15a2 2 0 0 0 1.7-3L13.7 4.2a2 2 0 0 0-3.4 0Z" stroke-width="2"></path><path d="M12 9v4M12 17h.01" stroke-width="2" stroke-linecap="round"></path></svg></span>
            </div>
          </div>
        </div>
      </div>



      <!-- Prescription lists -->
      <div class="grid lg:grid-cols-2 gap-6">
        <app-prescription-list
          title="Active Prescriptions"
          [prescriptions]="activePrescriptions"
          emptyMessage="No active prescriptions"
          [showActions]="true"
          [scrollable]="true"
          [loading]="loading"
          (onView)="viewPrescription($event)"
          (onRenew)="viewPrescription($event)"
          (onCancel)="viewPrescription($event)"
          (onDownloadPdf)="onPdfGenerated($event)">
        </app-prescription-list>

        <app-prescription-list
          title="History"
          [prescriptions]="pastPrescriptions"
          emptyMessage="No past prescriptions"
          [showActions]="false"
          [scrollable]="true"
          [loading]="loading"
          (onView)="viewPrescription($event)">
        </app-prescription-list>
      </div>
    </div>

    <!-- TAB: New Prescription -->
    <div *ngIf="activeTab === 'new-prescription'" class="space-y-6">
      <app-prescription-form
        [patientId]="selectedPatientId"
        [doctorId]="currentUser?.userId || ''"
        [appointmentId]="selectedAppointmentId"
        (onSubmit)="onFormSubmit($event)"
        (onClose)="activeTab = 'issued'">
      </app-prescription-form>
    </div>

  </div>
</div>

<!-- Details Modal -->
<app-prescription-details
  *ngIf="selectedPrescription"
  [prescription]="selectedPrescription"
  [canManage]="true"
  (onClose)="closeDetails()"
  (onRenewed)="onPrescriptionRenewed($event)"
  (onCancelled)="onPrescriptionCancelled($event)"
  (onPdfGenerated)="onPdfGenerated($event)">
</app-prescription-details>
