<div class="tracking-assistant">
  <button type="button" class="assistant-launcher" (click)="toggleOpen()">
    <span class="assistant-launcher-icon">🤖</span>
    <span class="assistant-launcher-text">Assistant</span>
  </button>

  <section class="assistant-panel" *ngIf="isOpen">
    <header class="assistant-header">
      <div>
        <p class="assistant-eyebrow">EverCare Guide</p>
        <h3>Tracking Assistant</h3>
      </div>

      <button type="button" class="assistant-close" (click)="toggleOpen()">
        ×
      </button>
    </header>

    <p class="assistant-subtitle">
      Lightweight guidance for safe zones, movement checks, and fast setup.
    </p>

    <div class="assistant-messages">
      <article
        *ngFor="let message of messages; trackBy: trackByMessage"
        class="assistant-message"
        [class.patient]="message.role === 'patient'"
        [class.warning]="message.tone === 'warning'"
        [class.danger]="message.tone === 'danger'">
        <span class="assistant-role">
          {{ message.role === 'assistant' ? 'Assistant' : 'You' }}
        </span>
        <p>{{ message.text }}</p>
      </article>
    </div>

    <div class="assistant-actions">
      <button
        *ngFor="let item of quickActions"
        type="button"
        class="assistant-chip primary"
        (click)="handleAction(item.action)">
        {{ item.label }}
      </button>
    </div>

    <div class="assistant-actions muted">
      <button
        *ngFor="let reply of quickReplies"
        type="button"
        class="assistant-chip"
        (click)="sendQuickReply(reply)">
        {{ reply }}
      </button>
    </div>

    <div class="assistant-input-row">
      <input
        type="text"
        [(ngModel)]="draftMessage"
        placeholder="Ask something about this location"
        (keyup.enter)="submitDraft()" />

      <button type="button" class="assistant-send" (click)="submitDraft()">
        Send
      </button>
    </div>
  </section>
</div>
