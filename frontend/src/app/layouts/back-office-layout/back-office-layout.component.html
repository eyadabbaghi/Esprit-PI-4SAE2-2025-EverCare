<div class="back-office-shell">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <img src="/logo.png" alt="EverCare logo">
      </div>
      <div>
        <span class="brand-overline">EverCare</span>
        <strong>Admin Console</strong>
      </div>
    </div>

    <div class="sidebar-user-card" routerLink="/admin/profile">
      <div class="sidebar-avatar">
        <ng-container *ngIf="user?.profilePicture; else sidebarInitials">
          <img [src]="user?.profilePicture" [alt]="user?.name || 'Admin profile'">
        </ng-container>
        <ng-template #sidebarInitials>{{ getInitials(user?.name) }}</ng-template>
      </div>
      <div>
        <strong>{{ user?.name || 'Admin user' }}</strong>
        <p>{{ user?.email || 'Administrator' }}</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/admin"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="nav-active"
        class="nav-link"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 13h8V3H3z"></path>
          <path d="M13 21h8v-6h-8z"></path>
          <path d="M13 3h8v8h-8z"></path>
          <path d="M3 21h8v-6H3z"></path>
        </svg>
        <span>Dashboard</span>
      </a>

      <a routerLink="/admin/activities" routerLinkActive="nav-active" class="nav-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 12h4l3-8 4 16 3-8h4"></path>
        </svg>
        <span>Activities</span>
      </a>

      <a routerLink="/admin/users" routerLinkActive="nav-active" class="nav-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          <path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
          <path d="M21 21v-2a4 4 0 0 0-3-3.87"></path>
        </svg>
        <span>Users</span>
      </a>

      <a routerLink="/admin/blog" routerLinkActive="nav-active" class="nav-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5V4.5A2.5 2.5 0 0 1 6.5 2Z"></path>
        </svg>
        <span>Blog</span>
      </a>

      <a routerLink="/admin/medicaments" routerLinkActive="nav-active" class="nav-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.5 20.5 3.5 13.5a3.54 3.54 0 0 1 5-5l7 7a3.54 3.54 0 1 1-5 5Z"></path>
          <path d="m15 9 4.5-4.5"></path>
        </svg>
        <span>Medicaments</span>
      </a>

      <a routerLink="/admin/analytics" routerLinkActive="nav-active" class="nav-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 3v18h18"></path>
          <path d="m7 15 4-4 3 3 5-7"></path>
        </svg>
        <span>Analytics</span>
      </a>

      <a routerLink="/admin/profile" routerLinkActive="nav-active" class="nav-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Profile</span>
      </a>

      <a routerLink="/admin/settings" routerLinkActive="nav-active" class="nav-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="m4.93 4.93 2.12 2.12"></path>
          <path d="m16.95 16.95 2.12 2.12"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
          <path d="m4.93 19.07 2.12-2.12"></path>
          <path d="m16.95 7.05 2.12-2.12"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="support-card">
        <span>Account role  :   </span>
        <strong>{{ user?.role || 'ADMIN' }}</strong>
      </div>

      <button type="button" class="logout-button" (click)="onLogout()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <path d="m16 17 5-5-5-5"></path>
          <path d="M21 12H9"></path>
        </svg>
        <span>Log out</span>
      </button>
    </div>
  </aside>

  <main class="back-office-main">
    <router-outlet></router-outlet>
  </main>
</div>
