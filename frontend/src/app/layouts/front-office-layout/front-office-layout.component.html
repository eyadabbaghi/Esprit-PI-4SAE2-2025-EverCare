<div class="min-h-screen flex flex-col bg-background text-foreground">
  <app-front-office-navigation *ngIf="!hideNavigation"></app-front-office-navigation>

  <main class="flex-1">
    <router-outlet></router-outlet>

  </main>

  <app-ai-assistant *ngIf="!hideNavigation"></app-ai-assistant>
  <app-onboarding-tutorial *ngIf="!hideNavigation"></app-onboarding-tutorial>
  <app-emergency-sos-popup *ngIf="!hideNavigation"></app-emergency-sos-popup>
  <app-alert-alarm
    *ngIf="showGlobalAlertAlarm"
    (dismissed)="resolveGlobalAlert($event)">
  </app-alert-alarm>
  <app-patient-check
    *ngIf="showPatientCheckReceiver"
    [patientId]="user?.userId || ''"
    [caregiverId]="patientCheckCaregiverId">
  </app-patient-check>

</div>
