apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: evercare
  labels:
    app: appointment-service
spec:
  type: ClusterIP
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
  selector:
    app: appointment-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service-deployment
  namespace: evercare
  labels:
    app: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: badrftw/evercare-appointment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: "http://eureka-service:8761/eureka/"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/EverCaredb?createDatabaseIfNotExist=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "admin"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak-service:8080/realms/EverCareRealm/protocol/openid-connect/certs"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /EverCare/actuator/health
              port: 8086
            initialDelaySeconds: 240
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /EverCare/actuator/health
              port: 8086
            initialDelaySeconds: 240
            periodSeconds: 5