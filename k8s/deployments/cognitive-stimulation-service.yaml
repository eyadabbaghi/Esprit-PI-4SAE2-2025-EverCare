apiVersion: v1
kind: Service
metadata:
  name: cognitive-stimulation-service
  namespace: evercare
  labels:
    app: cognitive-stimulation-service
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
  selector:
    app: cognitive-stimulation-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-stimulation-service-deployment
  namespace: evercare
  labels:
    app: cognitive-stimulation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cognitive-stimulation-service
  template:
    metadata:
      labels:
        app: cognitive-stimulation-service
    spec:
      containers:
        - name: cognitive-stimulation-service
          image: badrftw/evercare-cognitive-stimulation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: "http://eureka-service:8761/eureka/"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/EverCaredb?createDatabaseIfNotExist=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "admin"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 5