apiVersion: v1
kind: Service
metadata:
  name: evercare-ai-service
  namespace: evercare
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: evercare-ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evercare-ai-deployment
  namespace: evercare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evercare-ai
  template:
    metadata:
      labels:
        app: evercare-ai
    spec:
      containers:
        - name: evercare-ai
          image: badrftw/evercare-ai-frontend:latest
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              value: "gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5