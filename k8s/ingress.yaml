apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evercare-ingress
  namespace: evercare
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: evercare.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8089
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8089
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
  tls:
    - hosts:
        - evercare.local
      secretName: evercare-tls