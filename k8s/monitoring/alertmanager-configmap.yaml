apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: evercare
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'email-alerts'
      routes:
        - match:
            severity: critical
          receiver: 'email-alerts'
          continue: true

    receivers:
      - name: 'email-alerts'
        email_configs:
          - to: 'Bader.Klila@esprit.tn,baderklila@gmail.com,tnjoker99@gmail.com'
            from: 'evercare-alerts@gmail.com'
            smarthost: 'smtp.gmail.com:587'
            auth_username: 'evercare-alerts@gmail.com'
            auth_password: 'YOUR_APP_PASSWORD'
            send_resolved: true
            headers:
              subject: '[EverCare Alert] {{ .GroupLabels.alertname }}'

      - name: 'null'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']