apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: evercare
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager-service:9093

    rule_files:
      - "/etc/prometheus/rules/*"

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'user-service'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            regex: 'user-service.*'
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: application
            replacement: 'user-service'
        metrics_path: /EverCare/actuator/prometheus

      - job_name: 'api-gateway'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            regex: 'api-gateway.*'
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: application
            replacement: 'api-gateway'
        metrics_path: /EverCare/actuator/prometheus

      - job_name: 'eureka'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            regex: 'eureka.*'
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: application
            replacement: 'eureka'
        metrics_path: /EverCare/actuator/prometheus

      - job_name: 'keycloak'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            regex: 'keycloak.*'
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: application
            replacement: 'keycloak'
        metrics_path: /auth/realms/EverCareRealm/protocol/prometheus

      - job_name: 'evercare-ai'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            regex: 'evercare-ai.*'
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: application
            replacement: 'evercare-ai'
        metrics_path: /actuator/prometheus

      - job_name: 'frontend'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            regex: 'frontend.*'
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: application
            replacement: 'frontend'
        metrics_path: /actuator/prometheus

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: '(.*):10250'
            replacement: '${1}:9100'
            target_label: __address__

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?:(\d+)
            replacement: $1:$2
            target_label: __address__